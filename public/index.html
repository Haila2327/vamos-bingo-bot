<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vamos Bingo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 10px;
            text-align: center;
        }
        .header {
            background: #ffcc00;
            padding: 10px;
            font-weight: bold;
            font-size: 1.2em;
        }
        .info {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
        }
        .bingo-card {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .cell {
            background: #f8f8f8;
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            font-size: 1.2em;
            cursor: pointer;
        }
        .cell.marked {
            background: #4caf50;
            color: white;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            background: #ff6600;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
        }
        #called-numbers {
            background: #fff;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }
        .current-call {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="header">🎲 Vamos Bingo</div>
    <div class="info">
        <div>💰 Wallet: <span id="wallet">0</span></div>
        <div>🎯 Stake: 10</div>
    </div>
    <div id="called-numbers">
        <strong>Called Numbers:</strong> <span id="called-list"></span>
    </div>
    <div class="current-call" id="current-call">-</div>
    <div id="bingo-card" class="bingo-card"></div>
    <div class="controls">
        <button id="bingo-btn">🎉 BINGO 🎉</button>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        const gameId = urlParams.get('gameId');

        if (!userId || !gameId) {
            tg.showAlert('Missing user or game ID. Please restart from the bot.');
            tg.close();
        }

        let card = null;
        let calledNumbers = [];

        async function fetchGameStatus() {
            const res = await fetch(`/api/game/status?userId=${userId}&gameId=${gameId}`);
            if (!res.ok) {
                const err = await res.json();
                tg.showAlert(err.error || 'Failed to load game');
                return null;
            }
            return await res.json();
        }

        function renderCard() {
            const container = document.getElementById('bingo-card');
            container.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 5; j++) {
                    const num = card[i][j];
                    const isMarked = (num === 0) || calledNumbers.includes(num);
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (isMarked ? ' marked' : '');
                    cell.textContent = num === 0 ? '★' : num;
                    container.appendChild(cell);
                }
            }
        }

        function updateUI(data) {
            if (data.card) card = data.card;
            if (data.called_numbers) {
                calledNumbers = data.called_numbers;
                document.getElementById('called-list').textContent = calledNumbers.sort((a,b)=>a-b).join(', ');
                const last = calledNumbers.length ? calledNumbers[calledNumbers.length-1] : '-';
                document.getElementById('current-call').textContent = last;
            }
            if (card) renderCard();
        }

        async function claimBingo() {
            const res = await fetch('/api/game/bingo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: parseInt(userId), gameId: parseInt(gameId) })
            });
            const result = await res.json();
            if (result.success) {
                tg.showAlert(`🎉 Congratulations! You won ${result.prize} birr!`);
                tg.close();
            } else {
                tg.showAlert(result.error || 'Invalid bingo claim.');
            }
        }

        async function init() {
            const data = await fetchGameStatus();
            if (!data) {
                tg.close();
                return;
            }
            updateUI(data);
            document.getElementById('bingo-btn').onclick = claimBingo;
            // Poll every 3 seconds
            setInterval(async () => {
                const newData = await fetchGameStatus();
                if (newData) {
                    updateUI(newData);
                    if (newData.status === 'ended') {
                        tg.showAlert('The game has ended. Thank you for playing!');
                        tg.close();
                    }
                }
            }, 3000);
        }

        init();
    </script>
</body>
</html>
